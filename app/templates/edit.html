{% extends 'base.html' %}

{% block title %}Edit Task - Taskify{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Edit Task</h2>
            <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary">Back to Tasks</a>
        </div>

        <div class="card">
            <div class="card-body p-4">
                <form action="{{ url_for('main.update', todo_id=todo.id) }}" method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

                    <div class="mb-3">
                        <label for="title" class="form-label">Task Title</label>
                        <input type="text" class="form-control form-control-lg" id="title" name="title"
                            value="{{ todo.title }}" required>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-4">
                            <label for="status" class="form-label">Status</label>
                            <select class="form-select" id="status" name="status">
                                <option value="Pending" {% if todo.status=='Pending' %}selected{% endif %}>Pending
                                </option>
                                <option value="In Progress" {% if todo.status=='In Progress' %}selected{% endif %}>In
                                    Progress</option>
                                <option value="Completed" {% if todo.status=='Completed' %}selected{% endif %}>Completed
                                </option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label for="priority" class="form-label">Priority</label>
                            <select class="form-select" id="priority" name="priority">
                                <option value="Low" {% if todo.priority=='Low' %}selected{% endif %}>Low</option>
                                <option value="Medium" {% if todo.priority=='Medium' %}selected{% endif %}>Medium
                                </option>
                                <option value="High" {% if todo.priority=='High' %}selected{% endif %}>High</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label for="due_date" class="form-label">Due Date</label>
                            <input type="date" class="form-control" id="due_date" name="due_date"
                                value="{% if todo.due_date %}{{ todo.due_date.strftime('%Y-%m-%d') }}{% endif %}">
                        </div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-primary px-4">Save Changes</button>
                    </div>

                </form>

                <form action="{{ url_for('main.delete', todo_id=todo.id) }}" method="POST" class="mt-3">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                    <button type="submit" class="btn btn-danger"
                        onclick="return confirm('Are you sure you want to delete this task?')">Delete Task</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
